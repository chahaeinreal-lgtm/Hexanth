<!DOCTYPE html>
<html>
<head>
  <title>Watch - HEXANTH</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial;
    }

    header {
      padding: 10px;
      background: black;
      color: red;
      font-size: 22px;
    }

    .player {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    iframe {
      width: 100%;
      height: 500px;
      border: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>🎬 HEXANTH PLAYER</header>

<div class="player">
  <iframe id="player" allowfullscreen></iframe>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const s = params.get("s");
const e = params.get("e");

document.getElementById("player").src =
`https://www.vidking.net/embed/tv/${id}/${s}/${e}?color=e50914&autoPlay=true&nextEpisode=true&episodeSelector=true`;
</script>

</body>
</html>
