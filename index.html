<!DOCTYPE html>
<html>
<head>
  <title>HEXANTH</title>
  <style>
    body {
      margin: 0;
      background: #0f0f1a;
      color: white;
      font-family: Arial;
    }

    header {
      padding: 15px;
      font-size: 26px;
      background: black;
      color: red;
      font-weight: bold;
    }

    .row {
      display: flex;
      overflow-x: auto;
      padding: 20px;
      gap: 15px;
    }

    .card {
      min-width: 200px;
      background: #1a1a2e;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.1);
    }

    .card img {
      width: 100%;
      height: 250px;
    }

    .card h3 {
      text-align: center;
      padding: 10px;
    }
  </style>
</head>

<body>

<header>🔥 HEXANTH</header>

<div class="row">

  <div class="card" onclick="watch('119051',1,8)">
    <img src="https://via.placeholder.com/200x250">
    <h3>Anime 1</h3>
  </div>

  <div class="card" onclick="watch('119051',1,9)">
    <img src="https://via.placeholder.com/200x250">
    <h3>Anime 2</h3>
  </div>

</div>

<script>
function watch(id, season, episode) {
  window.location.href = `watch.html?id=${id}&s=${season}&e=${episode}`;
}
</script>

</body>
</html>
